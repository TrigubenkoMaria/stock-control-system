<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WMS Система</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'product_list' %}">📦 МойСклад</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="{% url 'product_list' %}">Товары</a>
                <a class="nav-link" href="{% url 'category_list' %}">Категории</a>
                <a class="nav-link" href="{% url 'warehouse_list' %}">Склады</a>
                <a class="nav-link" href="{% url 'transaction_list' %}">История</a>
            </div>
            <div class="navbar-nav">
                <a class="btn btn-success btn-sm me-2" href="{% url 'transaction_create' %}">+ Приход/Расход</a>
                <a class="btn btn-outline-light btn-sm" href="{% url 'product_create' %}">+ Товар</a>
            </div>
        </div>
    </nav>
    <div class="container bg-white p-4 shadow-sm rounded">
        {% block content %}{% endblock %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    </div>
</body>
</html>
