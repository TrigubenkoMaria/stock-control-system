<!DOCTYPE html>
{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between mb-3">
    <h2>Склады</h2>
    <a href="{% url 'warehouse_create' %}" class="btn btn-primary">+ Добавить склад</a>
</div>
<table class="table">
    <thead>
        <tr>
            <th>Название</th>
            <th>Адрес</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for w in warehouses %}
        <tr>
            <td>{{ w.name }}</td>
            <td>{{ w.address }}</td>
            <td>
                <a href="{% url 'warehouse_update' w.pk %}" class="btn btn-sm btn-warning">Изменить</a>
                <a href="{% url 'warehouse_delete' w.pk %}" class="btn btn-sm btn-danger">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
