<!DOCTYPE html>
{% extends 'base.html' %}
{% block content %}
    <div class="alert alert-danger">
        <h2>Удаление склада</h2>
        <p>Вы уверены, что хотите безвозвратно удалить склад <strong>"{{ object.name }}"</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Да, удалить</button>
            <a href="{% url 'warehouse_list' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
{% endblock %}
