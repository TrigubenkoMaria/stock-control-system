<!DOCTYPE html>
{% extends 'base.html' %}

{% block content %}
    <h2>{% if object %}Редактирование категории{% else %}Добавить новую категорию{% endif %}</h2>
    <hr>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{% url 'product_list' %}" class="btn btn-outline-secondary">Отмена</a>
    </form>
{% endblock %}
